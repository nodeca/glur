<script type="module">
    import blurMono16 from '../lib/blur_mono16.mjs';

    const dst    = document.getElementById('dst');
    const slider = document.getElementById('slider');
    const amount = document.getElementById('amount');
    const upload = document.getElementById('upload');
    const dstInfo = document.getElementById('dst-info');

    function debounce(fn, delay) {
        let timer;
        return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
    }

    let lastRadius;
    const img = new Image();

    const fastBlurCanvas = debounce(function (radius) {
        if (radius === lastRadius) { return; }
        lastRadius = radius;

        const ctx = dst.getContext('2d');
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, dst.width, dst.height);
        const data = imageData.data;
        const size = dst.width * dst.height;
        const dataMono16 = new Uint16Array(size);
        const start = performance.now();

        for (let i = 0; i < size; i++) {
            dataMono16[i] = (data[4 * i] + data[4 * i + 1] + data[4 * i + 2]) / 3;
        }

        blurMono16(dataMono16, dst.width, dst.height, radius);

        for (let i = 0; i < size; i++) {
            data[4 * i] = data[4 * i + 1] = data[4 * i + 2] = dataMono16[i];
        }

        ctx.putImageData(imageData, 0, 0);
        amount.value = radius + ' (' + (performance.now() - start).toFixed(2) + 'ms)';
    }, 200);

    img.onload = function () {
        dst.width = img.width;
        dst.height = img.height;
        dstInfo.textContent = img.width + ' x ' + img.height;

        const ctx = dst.getContext('2d');
        ctx.drawImage(img, 0, 0);

        lastRadius = -Infinity;

        if (upload.files.length === 0) { return; }
        img.src = URL.createObjectURL(upload.files[0]);
    });
</script>
